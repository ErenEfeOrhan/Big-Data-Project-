services:
  zookeeper:
    build:
      context: ./zookeeper
    image: spotify-zookeeper:local
    container_name: spotify_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    build:
      context: ./kafka
    image: spotify-kafka:local
    container_name: spotify_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  producer:
    build:
      context: ./producer
    container_name: spotify_producer
    depends_on:
      - kafka
    volumes:
      - ./data:/app/data
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: spotify_tracks
      DATA_FILE: /app/data/spotify_tracks.csv
      MESSAGES_PER_SECOND: 50
    command: ["python", "-u", "producer.py"]
    profiles:
      - producer

  spark:
    build:
      context: ./spark
    container_name: spotify_spark
    depends_on:
      - kafka
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./:/home/jovyan/work
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''

  mlflow:
    build:
      context: ./mlflow
    image: spotify-mlflow:local
    container_name: spotify_mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./mlflow:/mlflow
